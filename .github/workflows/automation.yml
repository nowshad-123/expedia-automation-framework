# NOTE: MakeMyTrip uses Akamai Bot Manager
# enterprise protection that blocks automated
# browser traffic from datacenter IPs.
# This pipeline runs @sanity tag which performs
# framework validation without heavy search load.
# Full regression suite runs locally via
# run_suite.bat / run_suite.sh


name: MakeMyTrip Automation Suite

# ─────────────────────────────────────────
#  TRIGGERS — when pipeline runs
# ─────────────────────────────────────────
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  # Manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      tags:
        description: 'Cucumber tag to run'
        required: false
        default: '@sanity'

# ─────────────────────────────────────────
#  JOBS
# ─────────────────────────────────────────
jobs:
  automation-tests:
    name: Run Automation Tests
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Get your code ──────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2: Install Java 21 ────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # ── Step 3: Install Firefox ────────
      - name: Install Firefox Browser
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y firefox
          firefox --version

      # ── Step 4: Install GeckoDriver ────
      - name: Install GeckoDriver
        run: |
          wget -q https://github.com/mozilla/geckodriver/releases/download/v0.36.0/geckodriver-v0.36.0-linux64.tar.gz
          tar -xzf geckodriver-v0.36.0-linux64.tar.gz
          sudo mv geckodriver /usr/local/bin/
          geckodriver --version

      # ── Step 5: Verify Setup ───────────
      - name: Verify Environment
        run: |
          java -version
          mvn -version
          firefox --version
          geckodriver --version

      # ── Step 6: Run Tests ──────────────
      - name: Run Sanity Tests
        run: |
          mvn test \
            -Dcucumber.filter.tags="${{ github.event.inputs.tags || '@sanity' }}" \
            -Dheadless=true \
            -Dbrowser=firefox \
            -Dmaven.test.failure.ignore=true
        env:
          DISPLAY: ':99'

      # ── Step 7: Save Reports ───────────
      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ github.run_number }}
          path: |
            reports/
            target/surefire-reports/
          retention-days: 30

      # ── Step 8: Save Screenshots ───────
      - name: Upload Failure Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-screenshots-${{ github.run_number }}
          path: reports/screenshots/
          retention-days: 7

      # ── Step 9: Test Summary ───────────
      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Cucumber Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false